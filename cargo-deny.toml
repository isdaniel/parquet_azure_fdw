# cargo-deny configuration for parquet_azure_fdw.
# Run locally with: cargo deny --config cargo-deny.toml check

[graph]
all-features = false
no-default-features = false

[advisories]
version = 2
yanked = "warn"
ignore = []

[licenses]
version = 2
# SPDX identifiers of licenses we are willing to ship.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "PostgreSQL",
    "Zlib",
    "OpenSSL",
    "CC0-1.0",
    "MPL-2.0",
]
confidence-threshold = 0.8

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "allow"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
