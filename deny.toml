# cargo-deny configuration for parquet_azure_fdw.
# Run locally with: cargo deny check

[graph]
all-features = false
no-default-features = false

[advisories]
version = 2
yanked = "warn"
ignore = [
    # paste: unmaintained, no replacement available. Transitive via parquet (arrow stack).
    "RUSTSEC-2024-0436",
    # serde_cbor: unmaintained. Transitive via azure_core → typespec_client_core.
    "RUSTSEC-2021-0127",
]

[licenses]
version = 2
# SPDX identifiers of licenses we are willing to ship.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "PostgreSQL",
    "Zlib",
    "OpenSSL",
    "CC0-1.0",
    "MPL-2.0",
    # webpki-root-certs (via reqwest → azure_core) ships Mozilla's CA bundle.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "allow"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
